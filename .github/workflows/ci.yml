name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Environment setup
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov mkdocs-material pymdown-extensions

      - name: Static analysis - flake8 critical
        run: |
          flake8 mkdocs_cdoc/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Static analysis - pylint report
        run: |
          pylint mkdocs_cdoc/ --disable=C0114,C0115,C0116,R0903,R0913,R0914,R0915,C0301,W0511 --exit-zero

      - name: Unit and integration tests
        run: |
          pytest tests/ -v --tb=short

      - name: Coverage report
        run: |
          pytest tests/ --cov=mkdocs_cdoc --cov-report=term-missing --cov-report=xml

      - name: Build validation
        run: |
          cd example
          mkdocs build
